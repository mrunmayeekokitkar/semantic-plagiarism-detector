[pytest]
# ── Path Resolution ───────────────────────────────────────────────────────────
# Register the repository root so pytest can find src, app, and utils packages
# without requiring manual PYTHONPATH exports or virtual env prefixing.
pythonpath = .

# ── Test Discovery ────────────────────────────────────────────────────────────
# Restrict discovery to the tests/ directory for faster collection.
testpaths = tests

# ── Output & Reporting Options ────────────────────────────────────────────────
# -v           Verbose test names
# --tb=short   Concise tracebacks - enough context without wall-of-text output
# --strict-markers  Raise error on unregistered marks to catch typos early
addopts = -v --tb=short --strict-markers

# ── Custom Markers ────────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require live database or network access
    unit: marks fast, isolated unit tests

# ── Warning Filters ───────────────────────────────────────────────────────────
# Suppress noisy deprecation/user warnings from heavy ML dependencies
# (PyTorch, scikit-learn, transformers, pandas) to keep CI output readable.
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning
